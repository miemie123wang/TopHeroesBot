name: Top Heroes Daily Sign-in

on:
  workflow_dispatch:

jobs:
  sign-in:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run sign-in
        run: node features/signin/signin.mjs
        env:
          RUN_MODE: debug
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_KEY: ${{ secrets.APPS_SCRIPT_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CONCURRENCY: 5